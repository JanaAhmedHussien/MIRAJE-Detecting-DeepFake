<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detection Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            margin: 0;
        }
        .node-shadow {
            box-shadow: 0 4px 6px -1px rgba(8, 145, 178, 0.2), 0 2px 4px -1px rgba(8, 145, 178, 0.1);
        }
    </style>
</head>
<body>

    <div class="relative flex flex-col items-center p-6 bg-white rounded-xl">
        
        <!-- Top Row: Main Pipeline -->
        <div class="flex items-center justify-center gap-2 md:gap-3">
            
            <div class="flex flex-col items-center justify-center w-20 h-16 border-2 border-cyan-500 border-dashed rounded-lg bg-cyan-50 text-cyan-800 text-xs font-semibold text-center leading-tight">
                <span>Input</span>
                <span class="text-[10px] font-normal opacity-75">(Data)</span>
            </div>

            <svg class="w-4 h-4 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

            <div class="flex items-center justify-center w-auto px-3 h-10 bg-cyan-100 border border-cyan-400 rounded-md text-cyan-900 text-[10px] font-semibold node-shadow">
                Preprocessing
            </div>

            <svg class="w-4 h-4 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

            <div class="flex items-center justify-center w-28 h-16 bg-gradient-to-br from-cyan-500 to-teal-400 rounded-lg text-white text-xs font-bold text-center node-shadow shadow-cyan-500/30">
                Vision<br>Transformer
            </div>

            <svg class="w-4 h-4 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

            <div class="flex items-center justify-center w-28 h-16 bg-gradient-to-br from-teal-400 to-cyan-600 rounded-lg text-white text-xs font-bold text-center node-shadow shadow-teal-500/30">
                CNN<br>Enhancement
            </div>

            <svg class="w-4 h-4 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

            <div class="flex items-center justify-center w-20 h-16 bg-cyan-700 rounded-lg text-white text-xs font-bold text-center node-shadow">
                Classifier
            </div>

            <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

            <div class="flex items-center justify-center w-24 h-16 bg-gradient-to-br from-orange-400 to-red-400 rounded-lg text-white text-xs font-bold text-center shadow-lg shadow-orange-500/30">
                Prediction
            </div>

        </div>

        <!-- Connecting Line down to XAI -->
        <div class="relative w-full h-8 flex justify-center mt-2">
            <div class="absolute w-px h-8 bg-cyan-300 left-[48%]"></div>
            <svg class="absolute left-[48%] top-5 w-4 h-4 text-cyan-300 -translate-x-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </div>

        <!-- Bottom Row: XAI Box -->
        <div class="mt-4 flex flex-col items-center">
            <div class="px-8 py-3 border-2 border-cyan-400 border-dashed rounded-xl bg-cyan-50/50 flex flex-col items-center justify-center text-cyan-700 node-shadow">
                <span class="text-sm font-bold">XAI</span>
            </div>
        </div>

    </div>

</body>
</html>
